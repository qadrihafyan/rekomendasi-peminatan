<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rekomendasi Peminatan Mahasiswa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F5FB;
    --surface:#FFFFFF;
    --line:#E7E8F2;
    --ink:#171923;
    --ink-soft:#6B7088;
    --violet:#6C5CE7;
    --violet-deep:#4B3FC4;
    --blue:#4F8DFD;
    --mint:#22C58B;
    --shadow:0 1px 2px rgba(23,25,35,0.04), 0 8px 24px -8px rgba(23,25,35,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',-apple-system,sans-serif;
    background:var(--bg);
    color:var(--ink);
  }

  /* ---------- Header ---------- */
  header{
    padding:18px 20px;
    background:var(--surface);
    border-bottom:1px solid var(--line);
  }
  .header-inner{
    max-width:680px;
    margin:0 auto;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .logo-dot{
    width:34px; height:34px;
    border-radius:10px;
    background:linear-gradient(135deg, var(--violet), var(--blue));
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-family:'Manrope',sans-serif;
    font-weight:800;
    color:#fff;
    font-size:14px;
  }
  .header-text h1{
    margin:0;
    font-family:'Manrope',sans-serif;
    font-weight:700;
    font-size:15.5px;
    line-height:1.2;
  }
  .header-text span{
    font-size:12px;
    color:var(--ink-soft);
  }

  main{
    max-width:680px;
    margin:0 auto;
    padding:28px 20px 70px;
  }

  /* ---------- Cards ---------- */
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:16px;
    padding:22px;
    margin-bottom:18px;
    box-shadow:var(--shadow);
  }
  .card-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
  }
  .card-head h2{
    font-family:'Manrope',sans-serif;
    font-weight:700;
    font-size:14.5px;
    margin:0;
  }
  .pill{
    font-size:11px;
    font-weight:600;
    color:var(--violet-deep);
    background:#EFECFD;
    padding:3px 9px;
    border-radius:99px;
  }

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  .field{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .field label{
    font-size:12.5px;
    color:var(--ink-soft);
    font-weight:500;
  }
  .field input{
    border:1.5px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    font-size:14px;
    font-family:'Inter',sans-serif;
    background:#FBFBFE;
    color:var(--ink);
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .field input::placeholder{ color:#B7BAC9; }
  .field input:focus{
    outline:none;
    border-color:var(--violet);
    box-shadow:0 0 0 3px rgba(108,92,231,0.13);
    background:#fff;
  }
  .field input.invalid{
    border-color:#E0594F;
    background:#FFF6F5;
  }
  .field input.filled{
    border-color:#C9E6D8;
  }

  /* progress */
  .progress-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
    gap:10px;
  }
  .progress-track{
    flex:1;
    height:6px;
    background:#EEEFF7;
    border-radius:99px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--blue), var(--violet));
    border-radius:99px;
    width:0%;
    transition:width .3s ease;
  }
  .progress-count{
    font-size:12px;
    font-weight:600;
    color:var(--ink-soft);
    flex-shrink:0;
    font-variant-numeric:tabular-nums;
  }

  .btn-row{ display:flex; gap:10px; margin-top:18px; }
  .btn-row button{ margin-top:0; }
  .btn-reset{
    width:auto;
    flex-shrink:0;
    background:#fff;
    color:var(--ink-soft);
    border:1.5px solid var(--line);
    padding:14px 18px;
  }
  .btn-reset:hover{ opacity:1; background:#FAFAFC; color:var(--ink); }

  .spinner{
    display:inline-block;
    width:14px; height:14px;
    border:2px solid rgba(255,255,255,0.4);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin .7s linear infinite;
    margin-right:8px;
    vertical-align:-2px;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  button{
    width:100%;
    background:linear-gradient(135deg, var(--violet), var(--violet-deep));
    color:#fff;
    border:none;
    border-radius:11px;
    padding:14px;
    font-size:14.5px;
    font-weight:700;
    font-family:'Manrope',sans-serif;
    cursor:pointer;
    margin-top:18px;
    transition:opacity .15s ease, transform .1s ease;
  }
  button:hover{ opacity:0.92; }
  button:active{ transform:scale(0.99); }
  button:disabled{ background:#C7C9D6; cursor:not-allowed; }

  /* ---------- Result ---------- */
  #result{
    display:none;
    opacity:0;
    transform:translateY(10px);
    transition:opacity .4s ease, transform .4s ease;
  }
  #result.show{
    opacity:1;
    transform:translateY(0);
  }

  .rekomendasi-utama{
    background:linear-gradient(135deg, var(--violet) 0%, var(--blue) 100%);
    color:#fff;
    border-radius:16px;
    padding:28px 22px;
    text-align:center;
    margin-bottom:18px;
    box-shadow:var(--shadow);
  }
  .rekomendasi-utama .label{
    font-size:11.5px;
    font-weight:600;
    letter-spacing:0.5px;
    text-transform:uppercase;
    color:rgba(255,255,255,0.8);
  }
  .rekomendasi-utama .value{
    font-family:'Manrope',sans-serif;
    font-size:24px;
    font-weight:800;
    margin-top:8px;
  }

  .bar-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 0;
    border-radius:10px;
  }
  .bar-row + .bar-row{ border-top:1px solid var(--line); }
  .bar-row:first-child{
    background:#F4FBF8;
    border:1px solid #CDEEE0;
    padding:10px 12px;
    margin:-1px -1px 6px;
  }
  .bar-row:first-child + .bar-row{ border-top:none; }
  .bar-label{
    width:170px;
    flex-shrink:0;
    font-size:13.5px;
    font-weight:500;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .badge-best{
    font-size:9.5px;
    font-weight:700;
    letter-spacing:0.3px;
    color:#fff;
    background:linear-gradient(135deg, var(--mint), #16A77A);
    padding:2px 7px;
    border-radius:99px;
    text-transform:uppercase;
  }
  .bar-track{
    flex:1;
    height:8px;
    background:#EEEFF7;
    border-radius:99px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    border-radius:99px;
    background:linear-gradient(90deg, var(--blue), var(--violet));
    transition:width .6s cubic-bezier(.4,0,.2,1);
    width:0%;
  }
  .bar-row:first-child .bar-fill{ background:linear-gradient(90deg, var(--mint), #16A77A); }
  .bar-pct{
    width:42px;
    text-align:right;
    font-size:13px;
    font-weight:700;
    color:var(--ink);
    flex-shrink:0;
  }

  .error{
    color:#B91C1C;
    background:#FEF2F2;
    border:1px solid #FCA5A5;
    border-radius:10px;
    padding:11px 14px;
    font-size:13px;
    margin-bottom:16px;
    display:none;
    font-weight:500;
  }

  @media (max-width:480px){
    .grid{ grid-template-columns:1fr; }
    .bar-label{ width:130px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-dot">TI</div>
    <div class="header-text">
      <h1>Rekomendasi Peminatan</h1>
      <span>Teknik Informatika</span>
    </div>
  </div>
</header>

<main>
  <div class="error" id="errorBox"></div>

  <div class="card">
    <div class="card-head">
      <h2>Data Mahasiswa</h2>
      <span class="pill">Opsional</span>
    </div>
    <div class="grid">
      <div class="field">
        <label>NIM</label>
        <input type="text" id="nim" placeholder="2111000123" />
      </div>
      <div class="field">
        <label>Nama</label>
        <input type="text" id="nama" placeholder="Nama lengkap" />
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <h2>Nilai Mata Kuliah</h2>
      <span class="pill">Skala 0–100</span>
    </div>
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-count" id="progressCount">0/10 terisi</div>
    </div>
    <div class="grid" id="nilaiGrid"></div>
    <div class="btn-row">
      <button id="submitBtn">Lihat Rekomendasi Peminatan</button>
      <button id="resetBtn" class="btn-reset" type="button">Reset</button>
    </div>
  </div>

  <div id="result">
    <div class="rekomendasi-utama">
      <div class="label">Rekomendasi Paling Sesuai</div>
      <div class="value" id="rekomendasiUtama">-</div>
    </div>

    <div class="card">
      <div class="card-head">
        <h2>Skor Kecocokan Semua Peminatan</h2>
      </div>
      <div id="rankingList"></div>
    </div>
  </div>
</main>

<script>
  const API_BASE = "https://rekomendasi-peminatan.vercel.app/api"; // ganti ke URL backend production nanti

  const MATA_KULIAH = [
    "Algoritma_Pemrograman",
    "Struktur_Data",
    "Basis_Data",
    "Rekayasa_Perangkat_Lunak",
    "Matematika_Diskrit",
    "Statistika_Probabilitas",
    "Jaringan_Komputer",
    "Sistem_Operasi",
    "Keamanan_Informasi",
    "Pemrograman_Mobile",
  ];

  const LABEL_TAMPIL = {
    Algoritma_Pemrograman: "Algoritma & Pemrograman",
    Struktur_Data: "Struktur Data",
    Basis_Data: "Basis Data",
    Rekayasa_Perangkat_Lunak: "Rekayasa Perangkat Lunak",
    Matematika_Diskrit: "Matematika Diskrit",
    Statistika_Probabilitas: "Statistika & Probabilitas",
    Jaringan_Komputer: "Jaringan Komputer",
    Sistem_Operasi: "Sistem Operasi",
    Keamanan_Informasi: "Keamanan Informasi",
    Pemrograman_Mobile: "Pemrograman Mobile",
  };

  const grid = document.getElementById("nilaiGrid");
  MATA_KULIAH.forEach((mk) => {
    const div = document.createElement("div");
    div.className = "field";
    div.innerHTML = `
      <label>${LABEL_TAMPIL[mk]}</label>
      <input type="number" min="0" max="100" id="${mk}" placeholder="0-100" />
    `;
    grid.appendChild(div);
  });

  const errorBox = document.getElementById("errorBox");
  const resultDiv = document.getElementById("result");
  const submitBtn = document.getElementById("submitBtn");
  const resetBtn = document.getElementById("resetBtn");
  const progressFill = document.getElementById("progressFill");
  const progressCount = document.getElementById("progressCount");

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = "block";
  }

  function clearError() {
    errorBox.style.display = "none";
  }

  function validateInput(input) {
    const val = input.value;
    if (val === "") {
      input.classList.remove("invalid", "filled");
      return;
    }
    const num = parseFloat(val);
    if (isNaN(num) || num < 0 || num > 100) {
      input.classList.add("invalid");
      input.classList.remove("filled");
    } else {
      input.classList.remove("invalid");
      input.classList.add("filled");
    }
  }

  function updateProgress() {
    const filled = MATA_KULIAH.filter((mk) => {
      const el = document.getElementById(mk);
      return el.value !== "" && !el.classList.contains("invalid");
    }).length;
    progressFill.style.width = `${(filled / MATA_KULIAH.length) * 100}%`;
    progressCount.textContent = `${filled}/${MATA_KULIAH.length} terisi`;
  }

  MATA_KULIAH.forEach((mk) => {
    const input = document.getElementById(mk);
    input.addEventListener("input", () => {
      validateInput(input);
      updateProgress();
      clearError();
    });
  });

  function focusFirstInvalidOrEmpty() {
    for (const mk of MATA_KULIAH) {
      const el = document.getElementById(mk);
      if (el.value === "" || el.classList.contains("invalid")) {
        el.focus();
        el.scrollIntoView({ behavior: "smooth", block: "center" });
        return;
      }
    }
  }

  resetBtn.addEventListener("click", () => {
    document.getElementById("nim").value = "";
    document.getElementById("nama").value = "";
    MATA_KULIAH.forEach((mk) => {
      const el = document.getElementById(mk);
      el.value = "";
      el.classList.remove("invalid", "filled");
    });
    updateProgress();
    clearError();
    resultDiv.classList.remove("show");
    resultDiv.style.display = "none";
    document.getElementById("nim").focus();
  });

  submitBtn.addEventListener("click", async () => {
    clearError();
    resultDiv.classList.remove("show");
    resultDiv.style.display = "none";

    const payload = {
      nim: document.getElementById("nim").value || null,
      nama: document.getElementById("nama").value || null,
    };

    for (const mk of MATA_KULIAH) {
      const input = document.getElementById(mk);
      const val = input.value;
      if (val === "") {
        showError(`Nilai "${LABEL_TAMPIL[mk]}" belum diisi.`);
        focusFirstInvalidOrEmpty();
        return;
      }
      if (input.classList.contains("invalid")) {
        showError(`Nilai "${LABEL_TAMPIL[mk]}" harus di antara 0–100.`);
        focusFirstInvalidOrEmpty();
        return;
      }
      payload[mk] = parseFloat(val);
    }

    submitBtn.disabled = true;
    submitBtn.innerHTML = `<span class="spinner"></span>Memproses...`;

    try {
      const res = await fetch(`${API_BASE}/recommend`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await res.json();

      if (!res.ok) {
        showError(data.detail || "Terjadi kesalahan di server.");
        return;
      }

      document.getElementById("rekomendasiUtama").textContent = data.rekomendasi_utama;

      const rankingList = document.getElementById("rankingList");
      rankingList.innerHTML = "";
      data.ranking_semua_peminatan.forEach((r, idx) => {
        const row = document.createElement("div");
        row.className = "bar-row";
        row.innerHTML = `
          <div class="bar-label">${r.peminatan}${idx === 0 ? '<span class="badge-best">Terbaik</span>' : ""}</div>
          <div class="bar-track"><div class="bar-fill" data-pct="${r.skor_kecocokan}"></div></div>
          <div class="bar-pct">${r.skor_kecocokan}%</div>
        `;
        rankingList.appendChild(row);
      });

      resultDiv.style.display = "block";
      // trigger animation + bar fill on next frame
      requestAnimationFrame(() => {
        resultDiv.classList.add("show");
        rankingList.querySelectorAll(".bar-fill").forEach((bar) => {
          bar.style.width = `${bar.dataset.pct}%`;
        });
      });
      resultDiv.scrollIntoView({ behavior: "smooth" });
    } catch (err) {
      showError("Koneksi ke server gagal. Pastikan backend sedang berjalan.");
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Lihat Rekomendasi Peminatan";
    }
  });
</script>

</body>
</html>
