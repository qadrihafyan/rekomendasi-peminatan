<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rekomendasi Peminatan Mahasiswa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F5FB;
    --surface:#FFFFFF;
    --line:#E7E8F2;
    --ink:#171923;
    --ink-soft:#6B7088;
    --violet:#6C5CE7;
    --violet-deep:#4B3FC4;
    --blue:#4F8DFD;
    --mint:#22C58B;
    --shadow:0 1px 2px rgba(23,25,35,0.04), 0 8px 24px -8px rgba(23,25,35,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',-apple-system,sans-serif;
    background:var(--bg);
    color:var(--ink);
  }

  /* ---------- Header ---------- */
  header{
    padding:18px 20px;
    background:var(--surface);
    border-bottom:1px solid var(--line);
  }
  .header-inner{
    max-width:680px;
    margin:0 auto;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .logo-dot{
    width:34px; height:34px;
    border-radius:10px;
    background:linear-gradient(135deg, var(--violet), var(--blue));
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-family:'Manrope',sans-serif;
    font-weight:800;
    color:#fff;
    font-size:14px;
  }
  .header-text h1{
    margin:0;
    font-family:'Manrope',sans-serif;
    font-weight:700;
    font-size:15.5px;
    line-height:1.2;
  }
  .header-text span{
    font-size:12px;
    color:var(--ink-soft);
  }

  main{
    max-width:680px;
    margin:0 auto;
    padding:28px 20px 70px;
  }

  /* ---------- Cards ---------- */
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:16px;
    padding:22px;
    margin-bottom:18px;
    box-shadow:var(--shadow);
  }
  .card-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
  }
  .card-head h2{
    font-family:'Manrope',sans-serif;
    font-weight:700;
    font-size:14.5px;
    margin:0;
  }
  .pill{
    font-size:11px;
    font-weight:600;
    color:var(--violet-deep);
    background:#EFECFD;
    padding:3px 9px;
    border-radius:99px;
  }

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  .field{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .field label{
    font-size:12.5px;
    color:var(--ink-soft);
    font-weight:500;
  }
  .field input{
    border:1.5px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    font-size:14px;
    font-family:'Inter',sans-serif;
    background:#FBFBFE;
    color:var(--ink);
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .field input::placeholder{ color:#B7BAC9; }
  .field input:focus{
    outline:none;
    border-color:var(--violet);
    box-shadow:0 0 0 3px rgba(108,92,231,0.13);
    background:#fff;
  }

  button{
    width:100%;
    background:linear-gradient(135deg, var(--violet), var(--violet-deep));
    color:#fff;
    border:none;
    border-radius:11px;
    padding:14px;
    font-size:14.5px;
    font-weight:700;
    font-family:'Manrope',sans-serif;
    cursor:pointer;
    margin-top:18px;
    transition:opacity .15s ease, transform .1s ease;
  }
  button:hover{ opacity:0.92; }
  button:active{ transform:scale(0.99); }
  button:disabled{ background:#C7C9D6; cursor:not-allowed; }

  /* ---------- Result ---------- */
  #result{ display:none; }

  .rekomendasi-utama{
    background:linear-gradient(135deg, var(--violet) 0%, var(--blue) 100%);
    color:#fff;
    border-radius:16px;
    padding:28px 22px;
    text-align:center;
    margin-bottom:18px;
    box-shadow:var(--shadow);
  }
  .rekomendasi-utama .label{
    font-size:11.5px;
    font-weight:600;
    letter-spacing:0.5px;
    text-transform:uppercase;
    color:rgba(255,255,255,0.8);
  }
  .rekomendasi-utama .value{
    font-family:'Manrope',sans-serif;
    font-size:24px;
    font-weight:800;
    margin-top:8px;
  }

  .bar-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 0;
  }
  .bar-row + .bar-row{ border-top:1px solid var(--line); }
  .bar-label{
    width:170px;
    flex-shrink:0;
    font-size:13.5px;
    font-weight:500;
  }
  .bar-track{
    flex:1;
    height:8px;
    background:#EEEFF7;
    border-radius:99px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    border-radius:99px;
    background:linear-gradient(90deg, var(--blue), var(--violet));
    transition:width .6s cubic-bezier(.4,0,.2,1);
  }
  .bar-row:first-child .bar-fill{ background:linear-gradient(90deg, var(--mint), #16A77A); }
  .bar-pct{
    width:42px;
    text-align:right;
    font-size:13px;
    font-weight:700;
    color:var(--ink);
    flex-shrink:0;
  }

  .error{
    color:#B91C1C;
    background:#FEF2F2;
    border:1px solid #FCA5A5;
    border-radius:10px;
    padding:11px 14px;
    font-size:13px;
    margin-bottom:16px;
    display:none;
    font-weight:500;
  }

  @media (max-width:480px){
    .grid{ grid-template-columns:1fr; }
    .bar-label{ width:130px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-dot">TI</div>
    <div class="header-text">
      <h1>Rekomendasi Peminatan</h1>
      <span>Teknik Informatika</span>
    </div>
  </div>
</header>

<main>
  <div class="error" id="errorBox"></div>

  <div class="card">
    <div class="card-head">
      <h2>Data Mahasiswa</h2>
      <span class="pill">Opsional</span>
    </div>
    <div class="grid">
      <div class="field">
        <label>NIM</label>
        <input type="text" id="nim" placeholder="2111000123" />
      </div>
      <div class="field">
        <label>Nama</label>
        <input type="text" id="nama" placeholder="Nama lengkap" />
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <h2>Nilai Mata Kuliah</h2>
      <span class="pill">Skala 0–100</span>
    </div>
    <div class="grid" id="nilaiGrid"></div>
    <button id="submitBtn">Lihat Rekomendasi Peminatan</button>
  </div>

  <div id="result">
    <div class="rekomendasi-utama">
      <div class="label">Rekomendasi Paling Sesuai</div>
      <div class="value" id="rekomendasiUtama">-</div>
    </div>

    <div class="card">
      <div class="card-head">
        <h2>Skor Kecocokan Semua Peminatan</h2>
      </div>
      <div id="rankingList"></div>
    </div>
  </div>
</main>

<script>
  const API_BASE = "https://rekomendasi-peminatan.vercel.app/api"; // ganti ke URL backend production nanti

  const MATA_KULIAH = [
    "Algoritma_Pemrograman",
    "Struktur_Data",
    "Basis_Data",
    "Rekayasa_Perangkat_Lunak",
    "Matematika_Diskrit",
    "Statistika_Probabilitas",
    "Jaringan_Komputer",
    "Sistem_Operasi",
    "Keamanan_Informasi",
    "Pemrograman_Mobile",
  ];

  const LABEL_TAMPIL = {
    Algoritma_Pemrograman: "Algoritma & Pemrograman",
    Struktur_Data: "Struktur Data",
    Basis_Data: "Basis Data",
    Rekayasa_Perangkat_Lunak: "Rekayasa Perangkat Lunak",
    Matematika_Diskrit: "Matematika Diskrit",
    Statistika_Probabilitas: "Statistika & Probabilitas",
    Jaringan_Komputer: "Jaringan Komputer",
    Sistem_Operasi: "Sistem Operasi",
    Keamanan_Informasi: "Keamanan Informasi",
    Pemrograman_Mobile: "Pemrograman Mobile",
  };

  const grid = document.getElementById("nilaiGrid");
  MATA_KULIAH.forEach((mk) => {
    const div = document.createElement("div");
    div.className = "field";
    div.innerHTML = `
      <label>${LABEL_TAMPIL[mk]}</label>
      <input type="number" min="0" max="100" id="${mk}" placeholder="0-100" />
    `;
    grid.appendChild(div);
  });

  const errorBox = document.getElementById("errorBox");
  const resultDiv = document.getElementById("result");
  const submitBtn = document.getElementById("submitBtn");

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = "block";
  }

  function clearError() {
    errorBox.style.display = "none";
  }

  submitBtn.addEventListener("click", async () => {
    clearError();
    resultDiv.style.display = "none";

    const payload = {
      nim: document.getElementById("nim").value || null,
      nama: document.getElementById("nama").value || null,
    };

    for (const mk of MATA_KULIAH) {
      const val = document.getElementById(mk).value;
      if (val === "") {
        showError(`Nilai "${LABEL_TAMPIL[mk]}" belum diisi.`);
        return;
      }
      payload[mk] = parseFloat(val);
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Memproses...";

    try {
      const res = await fetch(`${API_BASE}/recommend`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await res.json();

      if (!res.ok) {
        showError(data.detail || "Terjadi kesalahan di server.");
        return;
      }

      document.getElementById("rekomendasiUtama").textContent = data.rekomendasi_utama;

      const rankingList = document.getElementById("rankingList");
      rankingList.innerHTML = "";
      data.ranking_semua_peminatan.forEach((r) => {
        const row = document.createElement("div");
        row.className = "bar-row";
        row.innerHTML = `
          <div class="bar-label">${r.peminatan}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${r.skor_kecocokan}%"></div></div>
          <div class="bar-pct">${r.skor_kecocokan}%</div>
        `;
        rankingList.appendChild(row);
      });

      resultDiv.style.display = "block";
      resultDiv.scrollIntoView({ behavior: "smooth" });
    } catch (err) {
      showError("Koneksi ke server gagal. Pastikan backend sedang berjalan.");
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Lihat Rekomendasi Peminatan";
    }
  });
</script>

</body>
</html>
